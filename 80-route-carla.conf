# WirePlumber 0.5+ Dynamic Audio Routing Engine

monitor.properties = {
    # Keep global monitor rules here if needed
}

stream.rules = [
  # Rule 1: Send standard applications into the Virtual Sink, strictly avoiding Carla
  {
    matches = [
      {
        media.class = "Stream/Output/Audio"
        node.name   = "!~.*Carla.*"
      }
    ]
    actions = {
      update-props = {
        target.object = "input.Virtual_Sink"
      }
    }
  }
]

node.rules = [
  # Rule 2: Connect the loopback virtual sink output exclusively into Carla
  {
    matches = [
      {
        node.name = "output.Virtual_Sink"
      }
    ]
    actions = {
      update-props = {
        target.object = "Carla"
        node.dont-fallback = true
      }
    }
  },
  # Rule 3: Enforce downstream routing from Carla to HDMI and isolate it from the default sink loop
  {
    matches = [
      {
        node.name = "Carla"
      }
    ]
    actions = {
      update-props = {
        target.object = "alsa_output.pci-0000_01_00.1.hdmi-stereo-extra3"
        node.dont-fallback = true
        node.exclusive     = true
      }
    }
  }
]
